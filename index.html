<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>さんぱいGO</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  background: #f2f2f2;
  color: #222;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ロゴバナー */
.logo-banner {
  width: 100%;
  flex-shrink: 0;
  background: #1c6ea8;
  display: flex;
  justify-content: flex-start;
  align-items: center;
  padding: 0;
  overflow: hidden;
  height: 13vh;
}
.logo-banner img {
  height: 11vh;
  max-height: 85px;
  min-height: 48px;
  width: auto;
  display: block;
}




/* 地図 */
#map {
  height: 50vh;
  flex-shrink: 0;
}

/* 一覧エリア */
.list-wrap {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0 10px 20px;
}

.list-label {
  padding: 10px 2px 8px;
  font-size: 12px;
  font-weight: bold;
  color: #888;
}

/* カード */
.card {
  background: white;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.09);
  margin-bottom: 14px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.12s ease, box-shadow 0.12s ease;
}
.card:active {
  transform: scale(0.98);
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}
.card-body {
  padding: 14px 14px 10px;
}

.card-name {
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  background: #e53935;
  color: white;
  border-radius: 50%;
  font-size: 12px;
  font-weight: bold;
  flex-shrink: 0;
}

.card-meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 6px;
}
.card-distance {
  font-size: 13px;
  color: #555;
}
.price-badge {
  font-size: 12px;
  font-weight: bold;
  padding: 3px 9px;
  border-radius: 20px;
}
.price-cheap  { background: #e8f5e9; color: #2e7d32; }
.price-normal { background: #fff8e1; color: #e65100; }
.price-high   { background: #fdecea; color: #c62828; }

.card-items {
  font-size: 12px;
  color: #888;
}
.card-phone {
  font-size: 12px;
  color: #bbb;
  margin-top: 4px;
}

/* 電話ボタン */
.call-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  min-height: 62px;
  background: #e53935;
  color: white;
  text-decoration: none;
  font-size: 18px;
  font-weight: bold;
  border: none;
  letter-spacing: 0.04em;
  -webkit-tap-highlight-color: transparent;
  cursor: pointer;
}
.call-btn:active {
  background: #c62828;
}
.call-btn svg {
  width: 22px;
  height: 22px;
  flex-shrink: 0;
}
/* テストモード：無効状態 */
.call-btn.disabled {
  background: #ccc;
  cursor: not-allowed;
  color: #888;
}
.call-btn.disabled:active {
  background: #ccc;
}

/* 検索ボックス */
.search-box {
  margin-left: 14px;
  flex-shrink: 0;
  align-self: flex-end;
  padding-bottom: 6px;
}
.search-box input {
  height: 34px;
  width: 280px;
  max-width: 80vw;
  border-radius: 17px;
  border: none;
  padding: 0 12px;
  font-size: 13px;
  outline: none;
}

/* フッター注意書き */
.footer-note {
  padding: 10px 14px;
  font-size: 11px;
  color: #aaa;
  text-align: center;
  background: #f9f9f9;
  border-top: 1px solid #e0e0e0;
  flex-shrink: 0;
}
</style>
</head>
<body>

<!-- ロゴバナー -->
<div class="logo-banner">
  <img src="./images/logo.png" alt="さんぱいGO">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="例）大阪 木くず">
  </div>
</div>

<!-- 地図 -->
<div id="map"></div>

<!-- 一覧 -->
<div class="list-wrap" style="padding-bottom:0">
  <div class="list-label">📍 近い順で表示中</div>
  <div id="list"></div>
</div>

<!-- フッター注意書き -->
<div class="footer-note">※本サイトは現在テスト中です。表示されている情報・電話機能は実際には利用できません。</div>


<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ────────────────────────────────────────
// テストモードフラグ
// 本番公開時は false に変更するだけで電話機能が有効になります
const isTestMode = true;
// ────────────────────────────────────────


// ダミーデータ（距離昇順）
// ※ phone フィールドに本番番号を入力してください（isTestMode=false 時に使用されます）
const facilities = [
  {
    name: "大阪リサイクルセンター",
    region: "大阪",
    lat: 34.6937,
    lng: 135.5023,
    distance: 1.2,
    priceLevel: "cheap",
    items: "木くず・金属くず",
    phone: "0000000000" // 本番番号をここに入力
  },
  {
    name: "なにわ産廃処理場",
    region: "大阪",
    lat: 34.7100,
    lng: 135.4900,
    distance: 2.8,
    priceLevel: "normal",
    items: "混合廃棄物・がれき",
    phone: "0000000000" // 本番番号をここに入力
  },
  {
    name: "関西エコ処理センター",
    region: "大阪",
    lat: 34.6800,
    lng: 135.5200,
    distance: 3.5,
    priceLevel: "high",
    items: "廃プラ・廃油",
    phone: "0000000000" // 本番番号をここに入力
  },
  {
    name: "堺クリーンプラント",
    region: "堺",
    lat: 34.5800,
    lng: 135.4800,
    distance: 5.1,
    priceLevel: "cheap",
    items: "木くず・紙くず・混合",
    phone: "0000000000" // 本番番号をここに入力
  },
  {
    name: "近畿環境サービス",
    region: "大阪",
    lat: 34.7300,
    lng: 135.5300,
    distance: 6.4,
    priceLevel: "normal",
    items: "がれき・廃プラ・金属",
    phone: "0000000000" // 本番番号をここに入力
  }
];

// 表示用電話番号（isTestMode=true の場合はダミー表示）
function getPhoneDisplay(phone) {
  return isTestMode ? '000-0000-0000（テスト中）' : phone;
}

const priceMap = {
  cheap:  { label: "🟢 安い可能性あり", cls: "price-cheap"  },
  normal: { label: "🟡 普通",           cls: "price-normal" },
  high:   { label: "🔴 高め",           cls: "price-high"   }
};

// 地図初期化（大阪付近）
const map = L.map('map').setView([34.6937, 135.5023], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
}).addTo(map);

const listEl = document.getElementById('list');

// マーカーを全件生成（常時地図に存在・表示切替で制御）
const markers = facilities.map((f, i) => {
  const icon = L.divIcon({
    className: '',
    html: `<div style="
      width:28px;height:28px;background:#e53935;color:white;
      border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-weight:bold;font-size:14px;border:2px solid white;
      box-shadow:0 2px 5px rgba(0,0,0,0.35);">${i + 1}</div>`,
    iconSize: [28, 28],
    iconAnchor: [14, 14],
    popupAnchor: [0, -16]
  });
  return L.marker([f.lat, f.lng], { icon })
    .addTo(map)
    .bindPopup(`<b>${f.name}</b><br>${f.distance}km`);
});

// カード＋マーカー描画
function renderList(data) {
  listEl.innerHTML = '';

  // 0件表示
  if (data.length === 0) {
    listEl.innerHTML = `
      <div style="padding:30px;text-align:center;color:#999;font-size:14px;">
        該当する処分場が見つかりません
      </div>
    `;
    markers.forEach(m => { if (map.hasLayer(m)) map.removeLayer(m); });
    return;
  }

  // マーカー表示切替（name基準で照合）
  const dataNames = new Set(data.map(d => d.name));
  facilities.forEach((f, i) => {
    if (dataNames.has(f.name)) {
      if (!map.hasLayer(markers[i])) markers[i].addTo(map);
    } else {
      if (map.hasLayer(markers[i])) markers[i].remove();
    }
  });

  data.forEach((f, i) => {
    const num = i + 1;
    const price = priceMap[f.priceLevel];
    const markerIdx = facilities.findIndex(orig => orig.name === f.name);

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-body">
        <div class="card-name">
          <span class="card-num">${num}</span>${f.name}
        </div>
        <div class="card-meta">
          <span class="card-distance">📍 ${f.distance}km</span>
          <span class="price-badge ${price.cls}">${price.label}</span>
        </div>
        <div class="card-items">受入品目：${f.items}</div>
        <div class="card-phone">📞 ${getPhoneDisplay(f.phone)}</div>
      </div>
      <button class="call-btn${isTestMode ? ' disabled' : ''}" data-phone="${f.phone}" onclick="event.stopPropagation()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="${isTestMode ? '#aaa' : 'white'}">
          <path d="M6.6 10.8c1.5 3 3.6 5.1 6.6 6.6l2.2-2.2c.3-.3.8-.4 1.2-.2 1.3.5 2.7.8 4.2.8.7 0 1.2.5 1.2 1.2V21c0 .7-.5 1.2-1.2 1.2C10.3 22.2 1.8 13.7 1.8 3.2 1.8 2.5 2.3 2 3 2h3.4c.7 0 1.2.5 1.2 1.2 0 1.5.3 2.9.8 4.2.1.4 0 .9-.2 1.2l-2.2 2.2z"/>
        </svg>
        今すぐ電話${isTestMode ? '（テスト中）' : ''}
      </button>
    `;

    card.addEventListener('click', () => {
      map.setView([f.lat, f.lng], 15);
      markers[markerIdx].openPopup();
    });

    listEl.appendChild(card);
  });

  // 電話ボタンのイベント登録
  listEl.querySelectorAll('.call-btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
      if (isTestMode) {
        e.preventDefault();
        alert('現在テスト中のため電話は利用できません');
        return;
      }
      const phone = this.dataset.phone;
      if (phone) window.location.href = 'tel:' + phone;
    });
  });
}

// 検索
document.getElementById('searchInput').addEventListener('input', function() {
  const keyword = this.value.trim().toLowerCase();
  const words = keyword ? keyword.split(/\s+/) : [];

  const filtered = words.length === 0
    ? facilities
    : facilities
        .map(f => {
          let score = 0;
          words.forEach(w => {
            if (f.region.toLowerCase().includes(w)) score += 3;
            if (f.items.toLowerCase().includes(w))  score += 2;
            if (f.name.toLowerCase().includes(w))   score += 1;
          });
          return { ...f, score };
        })
        .filter(f => f.score > 0)
        .sort((a, b) => b.score - a.score)
        .map(({ score, ...f }) => f); // score を除去してから渡す

  renderList(filtered);
});

// 初期表示
renderList(facilities);
</script>
</body>
</html>
